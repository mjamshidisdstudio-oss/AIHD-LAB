name: CI/CD

on:
  push:
    branches:
      - main
      - master
      - '*.x'
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: read

jobs:
  # ─────────────────────────────────────────────────────
  # Test — PHPUnit matrix (PHP 8.2, 8.3, 8.4) × MySQL 8
  # ─────────────────────────────────────────────────────
  test:
    name: PHPUnit (${{ matrix.php }})
    runs-on: ubuntu-latest

    # The schema relies on MySQL 8 features (generated columns, CHECK
    # constraints, composite foreign keys, ENUM columns).
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: aihd_lab_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    strategy:
      fail-fast: true
      matrix:
        php: [8.2, 8.3, 8.4]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, bcmath, pdo, mysql, pdo_mysql
          coverage: none

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Copy environment file
        run: cp .env.example .env

      - name: Generate app key
        run: php artisan key:generate

      - name: Execute tests
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_USERNAME: root
          DB_PASSWORD: root
        run: vendor/bin/phpunit

  # ─────────────────────────────────────────────────────
  # Deploy to production (showroom-germany)
  # Runs after ALL test jobs pass — push to main only.
  # ─────────────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [test]
    timeout-minutes: 45
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    if: >
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
      || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')

    env:
      SSH_OPTS: -o StrictHostKeyChecking=yes -o ServerAliveInterval=15 -o ServerAliveCountMax=40

    steps:
      - name: Setup SSH agent
        env:
          SSH_PRIVATE_KEY_B64: ${{ secrets.SSH_PRIVATE_KEY_B64 }}
        run: |
          echo "$SSH_PRIVATE_KEY_B64" | base64 -d > "${RUNNER_TEMP}/deploy_key"
          chmod 600 "${RUNNER_TEMP}/deploy_key"
          eval "$(ssh-agent -s)"
          ssh-add "${RUNNER_TEMP}/deploy_key"
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> "$GITHUB_ENV"
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> "$GITHUB_ENV"

      - name: Add host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Test SSH connection
        run: |
          ssh $SSH_OPTS \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "echo 'SSH OK — $(hostname)'"

      - name: Run deploy script on server
        run: |
          ssh $SSH_OPTS \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "cd /opt/aihd-lab && \
             git fetch origin && git reset --hard origin/main && \
             sed -i 's/\r$//' infra/scripts/deploy-aihd-lab.sh && \
             bash infra/scripts/deploy-aihd-lab.sh"

      - name: Verify endpoints
        run: |
          echo "=== Verifying deployment ==="
          API_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            https://api.revivoto.ai/ || echo "failed")
          echo "api.revivoto.ai: $API_CODE"

          APP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            https://app.revivoto.ai/ || echo "failed")
          echo "app.revivoto.ai: $APP_CODE"

          if [ "$API_CODE" = "200" ] && [ "$APP_CODE" = "200" ]; then
            echo "✅ Deployment verified successfully"
          else
            echo "⚠️  Some endpoints returned unexpected status codes"
            echo "   api.revivoto.ai: $API_CODE (expected 200)"
            echo "   app.revivoto.ai: $APP_CODE (expected 200)"
          fi
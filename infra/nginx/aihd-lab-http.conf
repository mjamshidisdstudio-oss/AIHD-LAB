# revivoto.ai — redirect to api
server {
    listen 80;
    listen [::]:80;
    server_name revivoto.ai;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://api.revivoto.ai$request_uri;
    }
}

# api.revivoto.ai — Laravel API
server {
    listen 80;
    listen [::]:80;
    server_name api.revivoto.ai;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

